<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display:flex; align-items:center; gap: 18px; }
  .box { background: var(--royal-500); width:78px; height:78px; display:flex; align-items:flex-end; justify-content:center; padding-bottom:6px; color:#fff; font-family: var(--font-mono); font-size: 10.5px; }
  .item { display:flex; flex-direction: column; align-items:center; gap: 6px;}
  .name { font-size: 11px; color: var(--neutral-700); font-weight: 700; }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--neutral-500); }
  .pill { width: 110px; height: 38px; background: var(--royal-500); border-radius: 999px; display:flex; align-items:center; justify-content:center; color:#fff; font-size: 12px; font-family: var(--font-mono); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="item"><div class="box" style="border-radius:2px;">xs</div><div class="name">radius-xs</div><div class="meta">2 px</div></div>
    <div class="item"><div class="box" style="border-radius:4px;">sm</div><div class="name">radius-sm</div><div class="meta">4 px</div></div>
    <div class="item"><div class="box" style="border-radius:8px;">md</div><div class="name">radius-md / control</div><div class="meta">8 px</div></div>
    <div class="item"><div class="box" style="border-radius:12px;">lg</div><div class="name">radius-lg / card</div><div class="meta">12 px</div></div>
    <div class="item"><div class="box" style="border-radius:20px;">xl</div><div class="name">radius-xl</div><div class="meta">20 px</div></div>
    <div class="item"><div class="box" style="border-radius:28px;">2xl</div><div class="name">radius-2xl</div><div class="meta">28 px</div></div>
    <div class="item"><div class="pill">pill</div><div class="name">radius-pill</div><div class="meta">999 px</div></div>
  </div>
</div>
</body>
</html>
