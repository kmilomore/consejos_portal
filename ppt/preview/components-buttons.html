<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display:grid; grid-template-columns: auto auto auto auto; gap: 14px 18px; align-items:center; }
  .label { font-family: var(--font-mono); font-size: 11px; color: var(--neutral-500); }
  .btn {
    font-family: var(--font-sans);
    font-weight: 700;
    font-size: 14px;
    padding: 10px 18px;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    line-height: 1;
    display: inline-flex; align-items:center; gap: 8px;
    transition: background var(--dur-fast) var(--ease-standard), box-shadow var(--dur-fast) var(--ease-standard);
  }
  /* primary - royal fill */
  .btn.primary { background: var(--royal-500); color: #fff; box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);}
  .btn.primary.hover { background: var(--royal-600); }
  .btn.primary.press { background: var(--royal-700); }
  .btn.primary.disabled { opacity: .4; }
  /* secondary - navy outline */
  .btn.secondary { background: #fff; color: var(--navy-500); border-color: var(--navy-500); }
  .btn.secondary.hover { background: var(--navy-50); }
  .btn.secondary.press { background: var(--navy-100); }
  /* ghost */
  .btn.ghost { background: transparent; color: var(--navy-500); padding-left: 4px; padding-right: 4px; }
  .btn.ghost.hover { color: var(--navy-700); text-decoration: underline; text-underline-offset: 4px; }
  /* danger */
  .btn.danger { background: var(--coral-500); color: #fff; box-shadow: inset 0 1px 0 rgba(255,255,255,0.10);}
  .arrow {width:14px;height:14px; stroke: currentColor; fill: none; stroke-width: 2.2; stroke-linecap: round; stroke-linejoin: round;}
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="label">Primary</div>
    <button class="btn primary">Iniciar postulación
      <svg class="arrow" viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
    </button>
    <button class="btn primary hover">Hover</button>
    <button class="btn primary press">Active</button>

    <div class="label">Secondary</div>
    <button class="btn secondary">Descargar resolución</button>
    <button class="btn secondary hover">Hover</button>
    <button class="btn secondary press">Active</button>

    <div class="label">Ghost</div>
    <button class="btn ghost">Conocer más</button>
    <button class="btn ghost hover">Hover</button>
    <button class="btn primary disabled">Disabled</button>

    <div class="label">Danger</div>
    <button class="btn danger">Eliminar postulación</button>
    <button class="btn danger" style="background: var(--coral-600);">Hover</button>
    <button class="btn danger" style="background: var(--coral-700);">Active</button>
  </div>
</div>
</body>
</html>
