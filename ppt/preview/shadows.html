<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 8px; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 22px; padding: 8px; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 10px; }
  .box {
    width: 96px; height: 96px; background: #fff; border-radius: 12px;
    display:flex; align-items:center; justify-content:center;
    font-family: var(--font-mono); font-size: 11px; color: var(--neutral-500);
  }
  .name { font-size: 12px; color: var(--navy-500); font-weight: 700; }
  .meta { font-family: var(--font-mono); font-size: 10.5px; color: var(--neutral-500); }
  .xs { box-shadow: 0 1px 2px rgba(37,48,107,.06); }
  .sm { box-shadow: 0 2px 6px rgba(37,48,107,.08); }
  .md { box-shadow: 0 6px 18px rgba(37,48,107,.10); }
  .lg { box-shadow: 0 16px 40px rgba(37,48,107,.14); }
  .xl { box-shadow: 0 28px 64px rgba(37,48,107,.18); }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="item"><div class="box xs">xs</div><div class="name">shadow-xs</div><div class="meta">inputs, chips</div></div>
    <div class="item"><div class="box sm">sm</div><div class="name">shadow-sm</div><div class="meta">cards at rest</div></div>
    <div class="item"><div class="box md">md</div><div class="name">shadow-md</div><div class="meta">hover, popovers</div></div>
    <div class="item"><div class="box lg">lg</div><div class="name">shadow-lg</div><div class="meta">modals, toolbars</div></div>
    <div class="item"><div class="box xl">xl</div><div class="name">shadow-xl</div><div class="meta">overlays</div></div>
  </div>
</div>
</body>
</html>
