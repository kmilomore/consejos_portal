<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .specimen { display: flex; flex-direction: column; gap: 4px; }
  .specimen .meta { font-family: var(--font-mono); font-size: 11px; color: var(--neutral-500); }
  .d1 { font-weight: 900; font-size: 72px; line-height: 1.0; letter-spacing: -0.025em; color: var(--navy-500); }
  .d2 { font-weight: 900; font-size: 48px; line-height: 1.05; letter-spacing: -0.02em; color: var(--navy-500); }
  .h1 { font-weight: 900; font-size: 32px; line-height: 1.1; letter-spacing: -0.015em; color: var(--navy-500); }
  .eyebrow { font-weight: 700; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--royal-500); }
</style>
</head>
<body>
<div class="card">
  <div class="specimen"><div class="eyebrow">Display · Hero covers</div><div class="d1">Educación pública</div><div class="meta">Museo Sans · 900 · 72 / 1.0 · −0.025 em</div></div>
  <div class="specimen"><div class="d2">Confiamos en lo público</div><div class="meta">Museo Sans · 900 · 48 / 1.05 · −0.02 em</div></div>
  <div class="specimen"><div class="h1">Servicio Local de Educación Pública Colchagua</div><div class="meta">Museo Sans · 900 · 32 / 1.1 · −0.015 em · institutional H1</div></div>
</div>
</body>
</html>
