<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .card { padding: 0; gap: 0; }
  .utility {
    background: var(--navy-700);
    color: var(--neutral-100);
    font-size: 12px;
    padding: 8px 32px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .utility a { color: inherit; text-decoration: none; }
  .utility ul { display: flex; gap: 18px; list-style: none; margin: 0; padding: 0; }
  .masthead {
    background: linear-gradient(135deg, #25306B 0%, #2C3D9E 100%);
    color: #fff;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .badge { width: 56px; height: 56px; flex: 0 0 56px; }
  .badge img { width: 100%; height: 100%; object-fit: contain; }
  .wm-text { line-height: 1.05; }
  .wm-text .ovr { font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0.85; font-weight: 700; }
  .wm-text .nm { font-size: 18px; font-weight: 900; letter-spacing: -0.01em; }
  nav.primary { background: var(--navy-500); }
  nav.primary ul { display: flex; list-style: none; margin: 0; padding: 0 32px; gap: 4px; }
  nav.primary li a {
    color: #fff;
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
    padding: 14px 16px;
    display: inline-block;
    border-bottom: 3px solid transparent;
  }
  nav.primary li a.active { border-bottom-color: var(--coral-500); }
  nav.primary li a:hover { background: rgba(255,255,255,0.06); }
  .search {
    margin-left: auto;
    padding-right: 32px;
    display: flex; align-items: center;
  }
  .search input {
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.20);
    color: #fff;
    font-family: var(--font-sans);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12.5px;
    width: 220px;
  }
  .search input::placeholder { color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<div class="card">
  <div class="utility">
    <div>Gobierno de Chile · Ministerio de Educación</div>
    <ul>
      <li><a href="#">Contacto</a></li>
      <li><a href="#">Transparencia</a></li>
      <li><a href="#">Ley del Lobby</a></li>
      <li><a href="#">Denuncias</a></li>
    </ul>
  </div>
  <div class="masthead">
    <div class="badge"><img src="../../assets/logo-slep-colchagua.webp" alt="SLEP Colchagua" /></div>
    <div class="wm-text">
      <div class="ovr">Servicio Local de Educación Pública</div>
      <div class="nm">Colchagua</div>
    </div>
  </div>
  <nav class="primary">
    <ul>
      <li><a href="#" class="active">Inicio</a></li>
      <li><a href="#">Sobre el Servicio</a></li>
      <li><a href="#">Comunidades educativas</a></li>
      <li><a href="#">Noticias</a></li>
      <li><a href="#">Trámites</a></li>
      <li><a href="#">Transparencia</a></li>
    </ul>
    <div class="search"><input placeholder="Buscar en el sitio…" /></div>
  </nav>
</div>
</body>
</html>
