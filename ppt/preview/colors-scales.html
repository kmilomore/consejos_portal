<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display: grid; grid-template-columns: repeat(10, 1fr); gap: 6px; }
  .step { height: 76px; border-radius: 8px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; font-family: var(--font-mono); font-size: 10px; color: rgba(255,255,255,0.85); }
  .step.light { color: var(--navy-700); }
  .label-row { display: flex; gap: 12px; align-items: baseline; }
  .label-row .name { font-weight: 900; font-size: 14px; }
  .label-row .desc { font-size: 12px; color: var(--neutral-500); }
</style>
</head>
<body>
<div class="card">
  <div>
    <div class="label-row"><div class="name">Navy scale</div><div class="desc">50 → 900 · dominant structural color</div></div>
    <div class="scale" style="margin-top:8px;">
      <div class="step light" style="background:#EEF0F7;">50</div>
      <div class="step light" style="background:#D4D8E9;">100</div>
      <div class="step light" style="background:#A9B1D2;">200</div>
      <div class="step light" style="background:#7B85B6;">300</div>
      <div class="step" style="background:#525E96;">400</div>
      <div class="step" style="background:#25306B;">500</div>
      <div class="step" style="background:#1F2A5E;">600</div>
      <div class="step" style="background:#182250;">700</div>
      <div class="step" style="background:#131B40;">800</div>
      <div class="step" style="background:#0C122C;">900</div>
    </div>
  </div>
  <div>
    <div class="label-row"><div class="name">Royal scale</div><div class="desc">50 → 900 · interactive / accent</div></div>
    <div class="scale" style="margin-top:8px;">
      <div class="step light" style="background:#E5F2FB;">50</div>
      <div class="step light" style="background:#BFDEF4;">100</div>
      <div class="step light" style="background:#8FC4EA;">200</div>
      <div class="step" style="background:#56A6DE;">300</div>
      <div class="step" style="background:#208ECF;">400</div>
      <div class="step" style="background:#006BB9;">500</div>
      <div class="step" style="background:#005FA5;">600</div>
      <div class="step" style="background:#004F8A;">700</div>
      <div class="step" style="background:#003E6C;">800</div>
      <div class="step" style="background:#002A4C;">900</div>
    </div>
  </div>
  <div>
    <div class="label-row"><div class="name">Coral scale</div><div class="desc">50 → 900 · emphasis · used sparingly</div></div>
    <div class="scale" style="margin-top:8px;">
      <div class="step light" style="background:#FFE5E9;">50</div>
      <div class="step light" style="background:#FFC1C9;">100</div>
      <div class="step light" style="background:#FF8E9D;">200</div>
      <div class="step" style="background:#FF5C73;">300</div>
      <div class="step" style="background:#FF3855;">400</div>
      <div class="step" style="background:#FF1D3D;">500</div>
      <div class="step" style="background:#E5142F;">600</div>
      <div class="step" style="background:#BD0E25;">700</div>
      <div class="step" style="background:#94081B;">800</div>
      <div class="step" style="background:#6C0413;">900</div>
    </div>
  </div>
</div>
</body>
</html>
