<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display:flex; align-items:flex-end; gap: 14px; }
  .item { display:flex; flex-direction: column; align-items:center; gap: 6px;}
  .swatch { background: var(--royal-500); border-radius: 4px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--neutral-500); }
  .name { font-size: 11px; color: var(--neutral-700); font-weight: 700; }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="item"><div class="swatch" style="width:4px;height:4px;"></div><div class="name">space-1</div><div class="meta">4 px</div></div>
    <div class="item"><div class="swatch" style="width:8px;height:8px;"></div><div class="name">space-2</div><div class="meta">8 px</div></div>
    <div class="item"><div class="swatch" style="width:12px;height:12px;"></div><div class="name">space-3</div><div class="meta">12 px</div></div>
    <div class="item"><div class="swatch" style="width:16px;height:16px;"></div><div class="name">space-4</div><div class="meta">16 px</div></div>
    <div class="item"><div class="swatch" style="width:20px;height:20px;"></div><div class="name">space-5</div><div class="meta">20 px</div></div>
    <div class="item"><div class="swatch" style="width:24px;height:24px;"></div><div class="name">space-6</div><div class="meta">24 px</div></div>
    <div class="item"><div class="swatch" style="width:32px;height:32px;"></div><div class="name">space-8</div><div class="meta">32 px</div></div>
    <div class="item"><div class="swatch" style="width:40px;height:40px;"></div><div class="name">space-10</div><div class="meta">40 px</div></div>
    <div class="item"><div class="swatch" style="width:48px;height:48px;"></div><div class="name">space-12</div><div class="meta">48 px</div></div>
    <div class="item"><div class="swatch" style="width:64px;height:64px;"></div><div class="name">space-16</div><div class="meta">64 px</div></div>
    <div class="item"><div class="swatch" style="width:80px;height:80px;"></div><div class="name">space-20</div><div class="meta">80 px</div></div>
  </div>
  <div class="mono" style="margin-top:6px;">4-point grid · component padding 8–24 · section padding 48–96</div>
</div>
</body>
</html>
