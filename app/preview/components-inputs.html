<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display:grid; grid-template-columns: 1fr 1fr; gap: 18px 24px; align-items:start; }
  .field { display:flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; font-weight: 700; color: var(--navy-500); letter-spacing: 0.02em; }
  .field .hint { font-size: 11px; color: var(--neutral-500); }
  .field .err { font-size: 11px; color: var(--coral-600); font-weight: 700;}
  .input {
    font-family: var(--font-sans); font-weight: 500; font-size: 14px;
    padding: 10px 12px; border-radius: 8px;
    border: 1px solid var(--border-2); background: #fff; color: var(--navy-500);
    box-shadow: 0 1px 2px rgba(37,48,107,.06);
    transition: border-color 120ms var(--ease-standard), box-shadow 120ms var(--ease-standard);
  }
  .input::placeholder { color: var(--neutral-400); }
  .input.focus { border-color: var(--royal-500); box-shadow: 0 0 0 3px rgba(0,107,185,0.35); outline: none; }
  .input.error { border-color: var(--coral-500); box-shadow: 0 0 0 3px rgba(255,29,61,0.20); }
  .input.disabled { background: var(--neutral-50); color: var(--neutral-400); }
  .check { display:flex; align-items:center; gap: 10px; font-size: 14px; color: var(--navy-500); font-weight: 500;}
  .box { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--navy-500); display:inline-flex; align-items:center; justify-content:center; background: #fff; }
  .box.on { background: var(--royal-500); border-color: var(--royal-500); }
  .box.on::after { content: ""; width: 10px; height: 6px; border-left: 2px solid #fff; border-bottom: 2px solid #fff; transform: rotate(-45deg); margin-top: -3px; }
  .switch { width: 36px; height: 20px; background: var(--neutral-300); border-radius: 999px; position: relative; }
  .switch.on { background: var(--royal-500); }
  .switch::after { content:""; position:absolute; top: 2px; left: 2px; width: 16px; height: 16px; background:#fff; border-radius:50%; box-shadow: 0 1px 2px rgba(0,0,0,.18); transition: left 200ms var(--ease-standard); }
  .switch.on::after { left: 18px; }
</style>
</head>
<body>
<div class="card">
  <div class="grid">
    <div class="field">
      <label>RUT del apoderado</label>
      <input class="input" placeholder="12.345.678-9" />
      <div class="hint">Default · border var(--border-2)</div>
    </div>
    <div class="field">
      <label>Correo electrónico</label>
      <input class="input focus" value="contacto@slepcolchagua.cl" />
      <div class="hint">Focus · ring rgba(0,107,185,0.35)</div>
    </div>
    <div class="field">
      <label>Teléfono de contacto</label>
      <input class="input error" value="+569" />
      <div class="err">Ingrese 8 dígitos después del prefijo.</div>
    </div>
    <div class="field">
      <label>Establecimiento</label>
      <input class="input disabled" value="No disponible" disabled />
      <div class="hint">Disabled · bg neutral-50</div>
    </div>
    <div class="check">
      <span class="box on"></span> Acepto recibir comunicados oficiales
    </div>
    <div class="check">
      <span class="switch on"></span> Notificaciones por correo
    </div>
  </div>
</div>
</body>
</html>
