<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="_card.css">
<style>
  .row { display:grid; grid-template-columns: 110px 1fr; column-gap: 16px; row-gap: 14px; align-items: baseline;}
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--neutral-500); }
  .h2 { font-weight: 700; font-size: 28px; line-height: 1.2; letter-spacing: -0.015em; color: var(--navy-500); }
  .h3 { font-weight: 700; font-size: 22px; line-height: 1.25; color: var(--navy-500); }
  .h4 { font-weight: 700; font-size: 18px; line-height: 1.3; color: var(--navy-500); }
  .h5 { font-weight: 700; font-size: 16px; line-height: 1.4; color: var(--navy-500); }
  .eb { font-weight: 700; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--royal-500); }
</style>
</head>
<body>
<div class="card">
  <div class="row">
    <div class="meta">eyebrow</div><div class="eb">Comunicado oficial</div>
    <div class="meta">H2 · 28/1.2</div><div class="h2">Plan de mejoramiento territorial 2026</div>
    <div class="meta">H3 · 22/1.25</div><div class="h3">Educación parvularia y primer ciclo</div>
    <div class="meta">H4 · 18/1.3</div><div class="h4">Comunidades educativas participantes</div>
    <div class="meta">H5 · 16/1.4</div><div class="h5">Establecimientos por comuna</div>
  </div>
</div>
</body>
</html>
